# Pizza Center Garden API - Nginx Configuration
server {
    listen 80;
    server_name api.pizzacentergarden.uz;

    # Media files
    location /media/ {
        alias /var/www/pizzacentergarden/backend/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Media files ham CORS so'rashi mumkin (agar JS orqali yuklansa)
        add_header 'Access-Control-Allow-Origin' 'https://www.pizzacentergarden.uz' always;
        add_header 'Access-Control-Allow-Origin' 'https://pizzacentergarden.uz' always;
    }

    # Static files
    location /static/ {
        alias /var/www/pizzacentergarden/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Proxy
    location / {
        proxy_pass http://unix:/var/www/pizzacentergarden/backend/pizzacenter.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Preflight OPTIONS so'rovlarini to'g'ri qaytarish
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://www.pizzacentergarden.uz' always;
            add_header 'Access-Control-Allow-Origin' 'https://pizzacentergarden.uz' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRFToken' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
