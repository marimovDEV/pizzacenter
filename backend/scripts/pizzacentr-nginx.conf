# Pizza Center Garden API - Nginx Configuration
# Bu konfiguratsiya CORS muammolarini hal qilish uchun optimallashtirilgan.

server {
    listen 80;
    server_name api.pizzacentergarden.uz;

    # Media files
    location /media/ {
        alias /var/www/pizzacentergarden/backend/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Media uchun CORS (faqat rasm xizmati uchun)
        set $cors_origin "";
        if ($http_origin ~* "^https?://(www\.)?pizzacentergarden\.uz$") {
            set $cors_origin $http_origin;
        }
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
    }

    # Static files
    location /static/ {
        alias /var/www/pizzacentergarden/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API Proxy
    location / {
        proxy_pass http://unix:/var/www/pizzacentergarden/backend/pizzacenter.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Nginx-da CORS ishlatilsa, Djangodagi corsheaders bilan to'qnashishmasligi kerak.
        # Agar Django header qaytarmasa, Nginx o'zi qo'shadi.
        
        set $cors_origin "";
        if ($http_origin ~* "^https?://(www\.)?pizzacentergarden\.uz$") {
            set $cors_origin $http_origin;
        }

        # Preflight OPTIONS so'rovlarini to'g'ri qaytarish
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-CSRFToken' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
